<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibras Rescata - Caucasia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --vibras-color: #ffcc00; } /* Ajusta al color exacto de tu logo */
        .bg-vibras { background-color: var(--vibras-color); }
        .text-vibras { color: var(--vibras-color); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-vibras p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center italic">
                <i class="fas fa-leaf mr-2"></i> VIBRAS RESCATA
            </h1>
            <span class="text-xs font-semibold bg-black text-white px-2 py-1 rounded">CAUCASIA</span>
        </div>
    </header>

    <section class="p-6 bg-white text-center border-b">
        <h2 class="text-2xl font-bold text-gray-800">¡Rescata comida hoy!</h2>
        <p class="text-gray-600 italic mt-2">"Menos desperdicio, más abundancia para Caucasia"</p>
    </section>

    <div class="flex overflow-x-auto p-4 space-x-4 no-scrollbar">
        <button class="bg-black text-white px-4 py-2 rounded-full whitespace-nowrap">Todos</button>
        <button class="bg-white border px-4 py-2 rounded-full whitespace-nowrap">Panaderías</button>
        <button class="bg-white border px-4 py-2 rounded-full whitespace-nowrap">Frutas/Verduras</button>
        <button class="bg-white border px-4 py-2 rounded-full whitespace-nowrap">Restaurantes</button>
    </div>

    <main class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=400&q=80" alt="Panadería" class="w-full h-40 object-cover">
            <div class="p-4">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-lg text-gray-900">Panadería La Mejor</h3>
                        <p class="text-sm text-gray-500"><i class="fas fa-clock mr-1"></i> Recoger 5pm - 7pm</p>
                    </div>
                    <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">Quedan 3</span>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <div>
                        <span class="text-gray-400 line-through text-sm">$30.000</span>
                        <span class="text-xl font-bold text-red-600 ml-2">$12.000</span>
                    </div>
                    <button class="bg-black text-white px-4 py-2 rounded-lg font-bold hover:bg-vibras hover:text-black transition">Rescatar</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 text-gray-500">
        <a href="#" class="text-vibras text-center"><i class="fas fa-store block text-xl"></i><span class="text-[10px]">Tiendas</span></a>
        <a href="#" class="text-center"><i class="fas fa-heart block text-xl"></i><span class="text-[10px]">Favoritos</span></a>
        <a href="#" class="text-center"><i class="fas fa-user block text-xl"></i><span class="text-[10px]">Mi Perfil</span></a>
    </nav>

</body>
</html>
